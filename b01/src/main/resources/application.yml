spring:
  application:
    name: core-service
  datasource:
    url: jdbc:postgresql://localhost:5432/app_db
    username: <DB_USER>
    password: <DB_PASSWORD>
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: 8080
